<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone vliegcheck</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    p {
      font-size: 18px;
    }

    button {
      font-size: 20px;
      padding: 15px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #222;
      color: white;
    }

    #status {
      margin-top: 25px;
      padding: 20px;
      border-radius: 16px;
      font-size: 26px;
      font-weight: bold;
      min-height: 80px;
    }

    .info {
      background: #e7f1ff;
      color: #0b4a8b;
    }

    .goed {
      background: #d4f8d4;
      color: #126312;
    }

    .matig {
      background: #fff3cd;
      color: #856404;
    }

    .slecht {
      background: #f8d7da;
      color: #842029;
    }

    .klein {
      display: block;
      margin-top: 12px;
      font-size: 16px;
      font-weight: normal;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚁 Mag ik vliegen?</h1>
    <p>Klik op de knop en ik check automatisch het weer en zonneweer.</p>
    <button id="checkBtn">Check automatisch</button>
    <div id="status" class="info">Klik op de knop.</div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const checkBtn = document.getElementById("checkBtn");

    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Je browser ondersteunt geen locatie."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          () => reject(new Error("Locatie ophalen mislukt of werd geweigerd.")),
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      });
    }

    async function startCheck() {
      statusBox.className = "info";
      statusBox.innerHTML = "⏳ Bezig met checken...";

      try {
        const pos = await getLocation();
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const weerUrl =
          "https://api.open-meteo.com/v1/forecast?latitude=" +
          lat +
          "&longitude=" +
          lon +
          "&current=wind_speed_10m,wind_gusts_10m,precipitation&wind_speed_unit=kmh";

        const weerRes = await fetch(weerUrl);
        if (!weerRes.ok) {
          throw new Error("Weerdata kon niet geladen worden.");
        }

        const weerData = await weerRes.json();

        const wind = Number(weerData.current?.wind_speed_10m ?? 0);
        const gusts = Number(weerData.current?.wind_gusts_10m ?? 0);
        const regen = Number(weerData.current?.precipitation ?? 0);

        const kpRes = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
        if (!kpRes.ok) {
          throw new Error("Zonneweerdata kon niet geladen worden.");
        }

        const kpData = await kpRes.json();
        if (!Array.isArray(kpData) || kpData.length === 0) {
          throw new Error("Geen Kp-data gevonden.");
        }

        const laatste = kpData[kpData.length - 1];
        const kpRaw = laatste?.kp ?? laatste?.Kp ?? laatste?.estimated_kp ?? 0;

        let kp = parseFloat(kpRaw);
        if (Number.isNaN(kp)) {
          kp = 0;
        }

        let melding = "";
        let klasse = "";
        let extra = [];

        if (gusts > 30) {
          extra.push("💨 Te harde windstoten");
        } else if (gusts > 20) {
          extra.push("💨 Best veel windstoten");
        }

        if (regen > 0) {
          extra.push("🌧️ Regen");
        }

        if (kp >= 6) {
          extra.push("🌞 Sterke zonnestorm");
        } else if (kp >= 4) {
          extra.push("🌞 Actieve zon");
        }

        if (gusts > 30 || regen > 0 || kp >= 6) {
          klasse = "slecht";
          melding = "❌ Beter niet vliegen";
        } else if (gusts > 20 || kp >= 4) {
          klasse = "matig";
          melding = "⚠️ Voorzichtig vliegen";
        } else {
          klasse = "goed";
          melding = "✅ Ja, je kan vliegen";
        }

        statusBox.className = klasse;
        statusBox.innerHTML =
          melding +
          '<span class="klein">' +
          "Gewone wind: " + wind.toFixed(1) + " km/u<br>" +
          "Windstoten: " + gusts.toFixed(1) + " km/u<br>" +
          "Regen: " + regen.toFixed(1) + " mm<br>" +
          "Kp-index: " + kp.toFixed(1) +
          (extra.length ? "<br><br>" + extra.join("<br>") : "") +
          "</span>";

      } catch (error) {
        statusBox.className = "slecht";
        statusBox.innerHTML =
          "❌ Er ging iets mis" +
          '<span class="klein">' + error.message + "</span>";
        console.error(error);
      }
    }

    checkBtn.addEventListener("click", startCheck);
  </script>
</body>
</html>
