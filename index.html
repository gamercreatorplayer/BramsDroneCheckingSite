<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone AI die leert</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 24px;
    }

    .box {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 24px;
    }

    h1 { margin-top: 0; }

    input, button, select {
      font-size: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      margin: 8px 0;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
    }

    button {
      border: none;
      cursor: pointer;
      color: white;
      background: #2563eb;
      margin-right: 8px;
    }

    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .gray { background: #475569; }

    #previewImage {
      max-width: 320px;
      max-height: 240px;
      display: none;
      border-radius: 16px;
      margin-top: 10px;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 16px;
      margin-top: 18px;
    }

    .small {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚁 Lerende Drone AI</h1>
    <p class="small">
      Deze AI leert van jouw feedback. Als hij fout is, verbeter jij hem, en dat onthoudt hij.
    </p>

    <input type="file" id="imageUpload" accept="image/*" />
    <img id="previewImage" alt="Preview">

    <div class="card">
      <button id="predictBtn">Herken drone</button>
      <button id="resetMemoryBtn" class="gray">Geheugen leegmaken</button>
    </div>

    <div class="card">
      <div id="result">Nog geen voorspelling.</div>
      <div id="confidence" class="small"></div>
    </div>

    <div id="feedbackBox" class="card hidden">
      <strong>Was dit juist?</strong><br><br>
      <button id="correctBtn" class="green">Ja, klopt</button>
      <button id="wrongBtn" class="red">Nee, fout</button>
    </div>

    <div id="correctionBox" class="card hidden">
      <strong>Welke drone was het echt?</strong><br><br>
      <select id="correctLabel">
        <option>Gear2Play Sky Lightning Drone XS</option>
        <option>DJI Mini</option>
        <option>DJI Air</option>
        <option>FPV</option>
      </select>
      <br>
      <button id="saveCorrectionBtn">Opslaan en AI verbeteren</button>
    </div>

    <div class="card">
      <strong>Wat de AI geleerd heeft</strong>
      <div id="memoryView" class="small"></div>
    </div>
  </div>

  <script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/llpcFbVDm/";
    const MEMORY_KEY = "drone_ai_memory_v1";

    let model = null;
    let lastPrediction = null;
    let lastPredictions = [];
    let currentImageData = null;

    const imageUpload = document.getElementById("imageUpload");
    const previewImage = document.getElementById("previewImage");
    const result = document.getElementById("result");
    const confidence = document.getElementById("confidence");
    const feedbackBox = document.getElementById("feedbackBox");
    const correctionBox = document.getElementById("correctionBox");
    const correctLabel = document.getElementById("correctLabel");
    const memoryView = document.getElementById("memoryView");

    function getMemory() {
      try {
        return JSON.parse(localStorage.getItem(MEMORY_KEY)) || {
          confirmedCounts: {},
          correctionRules: {}
        };
      } catch {
        return {
          confirmedCounts: {},
          correctionRules: {}
        };
      }
    }

    function saveMemory(memory) {
      localStorage.setItem(MEMORY_KEY, JSON.stringify(memory));
      renderMemory();
    }

    function renderMemory() {
      const memory = getMemory();
      const parts = [];

      parts.push("<strong>Bevestigde labels:</strong><br>");
      const confirmedKeys = Object.keys(memory.confirmedCounts);
      if (confirmedKeys.length === 0) {
        parts.push("Nog niets geleerd.<br><br>");
      } else {
        for (const key of confirmedKeys) {
          parts.push("- " + key + ": " + memory.confirmedCounts[key] + "× bevestigd<br>");
        }
        parts.push("<br>");
      }

      parts.push("<strong>Correctieregels:</strong><br>");
      const correctionKeys = Object.keys(memory.correctionRules);
      if (correctionKeys.length === 0) {
        parts.push("Nog geen correcties opgeslagen.");
      } else {
        for (const key of correctionKeys) {
          parts.push("- Als AI zegt <em>" + key + "</em> ⇒ dan vaak <strong>" + memory.correctionRules[key] + "</strong><br>");
        }
      }

      memoryView.innerHTML = parts.join("");
    }

    imageUpload.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        previewImage.style.display = "block";
        currentImageData = e.target.result;
        result.textContent = "Foto geladen. Klaar om te herkennen.";
        confidence.textContent = "";
        feedbackBox.classList.add("hidden");
        correctionBox.classList.add("hidden");
      };
      reader.readAsDataURL(file);
    });

    async function loadModelIfNeeded() {
      if (!model) {
        model = await tmImage.load(
          MODEL_URL + "model.json",
          MODEL_URL + "metadata.json"
        );
      }
    }

    function applyLearningLayer(predictions) {
      const memory = getMemory();

      const boosted = predictions.map(p => ({
        ...p,
        adjustedProbability: p.probability
      }));

      for (const p of boosted) {
        const confirmedBoost = memory.confirmedCounts[p.className] || 0;
        p.adjustedProbability += confirmedBoost * 0.01;
      }

      boosted.sort((a, b) => b.adjustedProbability - a.adjustedProbability);

      if (boosted.length > 0) {
        const predictedLabel = boosted[0].className;
        const correctedLabel = memory.correctionRules[predictedLabel];

        if (correctedLabel) {
          return {
            finalLabel: correctedLabel,
            originalTopLabel: predictedLabel,
            predictions: boosted,
            wasCorrectedByMemory: true
          };
        }
      }

      return {
        finalLabel: boosted[0]?.className || "Onbekend",
        originalTopLabel: boosted[0]?.className || "Onbekend",
        predictions: boosted,
        wasCorrectedByMemory: false
      };
    }

    async function predictDrone() {
      if (!previewImage.src) {
        alert("Upload eerst een foto.");
        return;
      }

      await loadModelIfNeeded();

      const predictions = await model.predict(previewImage);
      const learned = applyLearningLayer(predictions);

      lastPrediction = learned.finalLabel;
      lastPredictions = learned.predictions;

      result.innerHTML =
        "🤖 Voorspelling: <strong>" + learned.finalLabel + "</strong>" +
        (learned.wasCorrectedByMemory
          ? "<br><span class='small'>Aangepast op basis van eerdere correcties.</span>"
          : "");

      confidence.innerHTML =
        "Originele topvoorspelling: " + learned.originalTopLabel + "<br>" +
        "Kans: " + ((learned.predictions[0]?.probability || 0) * 100).toFixed(1) + "%";

      feedbackBox.classList.remove("hidden");
      correctionBox.classList.add("hidden");
    }

    function confirmPrediction() {
      if (!lastPrediction) return;

      const memory = getMemory();
      memory.confirmedCounts[lastPrediction] = (memory.confirmedCounts[lastPrediction] || 0) + 1;
      saveMemory(memory);

      result.innerHTML += "<br><span class='small'>✅ Opgeslagen als juiste voorspelling.</span>";
      feedbackBox.classList.add("hidden");
    }

    function showCorrectionBox() {
      correctionBox.classList.remove("hidden");
    }

    function saveCorrection() {
      if (!lastPredictions.length) return;

      const wrongLabel = lastPredictions[0].className;
      const rightLabel = correctLabel.value;

      const memory = getMemory();
      memory.correctionRules[wrongLabel] = rightLabel;
      memory.confirmedCounts[rightLabel] = (memory.confirmedCounts[rightLabel] || 0) + 1;
      saveMemory(memory);

      result.innerHTML =
        "🧠 Verbeterd!<br><strong>" + wrongLabel + "</strong> zal voortaan vaker worden gecorrigeerd naar <strong>" + rightLabel + "</strong>.";

      feedbackBox.classList.add("hidden");
      correctionBox.classList.add("hidden");
    }

    function resetMemory() {
      localStorage.removeItem(MEMORY_KEY);
      renderMemory();
      result.textContent = "Geheugen gewist.";
      confidence.textContent = "";
      feedbackBox.classList.add("hidden");
      correctionBox.classList.add("hidden");
    }

    document.getElementById("predictBtn").addEventListener("click", predictDrone);
    document.getElementById("correctBtn").addEventListener("click", confirmPrediction);
    document.getElementById("wrongBtn").addEventListener("click", showCorrectionBox);
    document.getElementById("saveCorrectionBtn").addEventListener("click", saveCorrection);
    document.getElementById("resetMemoryBtn").addEventListener("click", resetMemory);

    renderMemory();
  </script>
</body>
</html>
